[package]
name = "pojoc-build"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Compile .pojoc schema files from build.rs into Rust encode/decode code"
readme = "../../README.md"
keywords = ["serialization", "encoding", "binary", "schema", "codegen"]
categories = ["encoding", "compilers"]

[lib]
path = "src/lib.rs"

[dependencies]
heck = { workspace = true }
thiserror = { workspace = true }
compact_str = { workspace = true }

[features]
default = ["serde"]
# Emit `Serialize`/`Deserialize` derives/impls in generated code. Requires the
# consuming crate to depend on `serde` directly (with the `derive` feature),
# and the `pojoc` runtime crate's own `serde` feature to also be enabled.
serde = []
