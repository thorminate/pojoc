name: CI

on:
  push:
    branches:
      - dev
      - "feature/**"
      - "fix/**"
      - "release/**"
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test