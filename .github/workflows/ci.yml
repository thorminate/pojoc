name: CI

on:
  push:
    branches:
      - dev
      - "feature/**"
      - "fix/**"
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc/capnp/flatc (crates/tests deps)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: protobuf-compiler capnproto flatbuffers-compiler
          version: 1.0

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: vscode-extension/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vscode-extension/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: pnpm install --frozen-lockfile

      - name: Typecheck extension
        working-directory: vscode-extension
        run: pnpm exec tsc --noEmit

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Typecheck plugin
        working-directory: jetbrains-plugin
        run: ./gradlew compileKotlin