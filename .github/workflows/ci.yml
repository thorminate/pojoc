name: CI

on:
  push:
    branches:
      - dev
      - "feature/**"
      - "fix/**"
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc/capnp (crates/tests deps)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: protobuf-compiler capnproto
          version: 1.0

      # Ubuntu's flatbuffers-compiler package is far behind the `flatbuffers`
      # Rust crate pinned in crates/tests/Cargo.toml, and flatc's generated
      # code is not compatible across major versions — install the exact
      # matching flatc release instead.
      - name: Determine flatc version
        id: flatc-version
        run: |
          version=$(grep '^flatbuffers = ' crates/tests/Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache flatc binary
        id: flatc-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/flatc
          key: flatc-${{ steps.flatc-version.outputs.version }}-linux

      - name: Install flatc (crates/tests deps)
        run: |
          mkdir -p ~/.local/bin
          if [ "${{ steps.flatc-cache.outputs.cache-hit }}" != "true" ]; then
            version="${{ steps.flatc-version.outputs.version }}"
            curl -fsSL -o flatc.zip \
              "https://github.com/google/flatbuffers/releases/download/v${version}/Linux.flatc.binary.clang++-18.zip"
            unzip -o flatc.zip -d ~/.local/bin flatc
            rm flatc.zip
          fi
          chmod +x ~/.local/bin/flatc
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: vscode-extension/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vscode-extension/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: pnpm install --frozen-lockfile

      - name: Typecheck extension
        working-directory: vscode-extension
        run: pnpm exec tsc --noEmit

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Typecheck plugin
        working-directory: jetbrains-plugin
        run: ./gradlew compileKotlin