name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_target: linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_target: win32-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_target: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_target: darwin-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} --package pojoc-cli
          cargo build --release --target ${{ matrix.target }} --package pojoc-lsp

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/pojoc \
             dist/pojoc-${{ github.ref_name }}-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/pojoc-lsp \
             dist/pojoc-lsp-${{ github.ref_name }}-${{ matrix.target }}

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/pojoc.exe \
             dist/pojoc-${{ github.ref_name }}-${{ matrix.target }}.exe
          cp target/${{ matrix.target }}/release/pojoc-lsp.exe \
             dist/pojoc-lsp-${{ github.ref_name }}-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.artifact_target }}
          path: dist/

  package-vsix:
    name: Package VSIX (${{ matrix.artifact }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - artifact: linux-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          - artifact: win32-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
          - artifact: darwin-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-apple-darwin
          - artifact: darwin-arm64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: bin-${{ matrix.artifact }}
          path: lsp-bin/

      - name: Copy LSP binary into extension
        shell: bash
        run: |
          mkdir -p vscode-extension/bin
          EXT=""
          [[ "${{ matrix.artifact }}" == "win32-x64" ]] && EXT=".exe"
          cp "lsp-bin/${{ matrix.lsp_bin }}" "vscode-extension/bin/pojoc-lsp${EXT}"
          chmod +x "vscode-extension/bin/pojoc-lsp${EXT}"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: vscode-extension

      - name: Compile extension
        run: pnpm run compile
        working-directory: vscode-extension

      - name: Package VSIX
        run: pnpm vsce package --target ${{ matrix.artifact }} --no-dependencies -o pojoc-vscode-extension-${{ github.ref_name }}-${{ matrix.artifact }}.vsix
        working-directory: vscode-extension

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.artifact }}
          path: vscode-extension/pojoc-vscode-extension-${{ github.ref_name }}-${{ matrix.artifact }}.vsix

  package-jetbrains:
    name: Package JetBrains Plugin
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: lsp-bins/
          merge-multiple: true

      - name: Stage LSP binaries into plugin
        shell: bash
        run: |
          mkdir -p jetbrains-plugin/src/main/resources/bin
          cp lsp-bins/pojoc-lsp-* jetbrains-plugin/src/main/resources/bin/
          chmod +x jetbrains-plugin/src/main/resources/bin/*

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: jetbrains-plugin
        run: ./gradlew buildPlugin

      - uses: actions/upload-artifact@v7
        with:
          name: jetbrains-plugin
          path: jetbrains-plugin/build/distributions/*.zip

  release:
    name: Publish Release
    needs: [build, package-vsix, package-jetbrains]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} dist/** \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            ${{ contains(github.ref_name, '-') && '--prerelease' || '' }}