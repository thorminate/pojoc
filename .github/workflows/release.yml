name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            vsix_target: linux-x64
            lsp_bin: pojoc-lsp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            vsix_target: win32-x64
            lsp_bin: pojoc-lsp.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            vsix_target: darwin-x64
            lsp_bin: pojoc-lsp
          - target: aarch64-apple-darwin
            os: macos-latest
            vsix_target: darwin-arm64
            lsp_bin: pojoc-lsp

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} --package pojoc-cli
          cargo build --release --target ${{ matrix.target }} --package pojoc-lsp

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/pojoc \
             dist/pojoc-${{ github.ref_name }}-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/pojoc-lsp \
             dist/pojoc-lsp-${{ github.ref_name }}-${{ matrix.target }}

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/pojoc.exe \
             dist/pojoc-${{ github.ref_name }}-${{ matrix.target }}.exe
          cp target/${{ matrix.target }}/release/pojoc-lsp.exe \
             dist/pojoc-lsp-${{ github.ref_name }}-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.vsix_target }}
          path: dist/

  package-vsix:
    name: Package VSIX (${{ matrix.vsix_target }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - vsix_target: linux-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          - vsix_target: win32-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
          - vsix_target: darwin-x64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-x86_64-apple-darwin
          - vsix_target: darwin-arm64
            lsp_bin: pojoc-lsp-${{ github.ref_name }}-aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.vsix_target }}
          path: lsp-bin/

      - name: Copy LSP binary into extension
        shell: bash
        run: |
          mkdir -p vscode-extension/bin
          EXT=""
          [[ "${{ matrix.vsix_target }}" == "win32-x64" ]] && EXT=".exe"
          cp "lsp-bin/${{ matrix.lsp_bin }}" "vscode-extension/bin/pojoc-lsp${EXT}"
          chmod +x "vscode-extension/bin/pojoc-lsp${EXT}"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: vscode-extension

      - name: Compile extension
        run: pnpm run compile
        working-directory: vscode-extension

      - name: Package VSIX
        run: pnpm vsce package --target ${{ matrix.vsix_target }} --no-dependencies -o pojoc-${{ github.ref_name }}-${{ matrix.vsix_target }}.vsix
        working-directory: vscode-extension

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsix_target }}
          path: vscode-extension/pojoc-${{ github.ref_name }}-${{ matrix.vsix_target }}.vsix

  release:
    name: Publish Release
    needs: [build, package-vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/**
